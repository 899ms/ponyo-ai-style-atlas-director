- id: cinematic_realism
  zh_name: 电影写实风
  en_name: Cinematic Realism
  category: 电影 / 商业 / 摄影类
  best_for:
  - 人物剧照
  - 品牌片封面
  - 故事分镜
  - 纪实感广告
  - 概念海报
  not_for:
  - 过度装饰海报
  - 儿童绘本
  - 扁平信息图
  dna:
    composition: 电影镜头构图，明确前中后景，主体有叙事动作，常用浅景深与环境层次。
    color: 自然色彩，受控的冷暖对比，可使用胶片 LUT、低饱和高动态范围。
    lighting: 真实摄影光源，街灯、窗光、自然光、雨夜反光、逆光或侧逆光。
    material: 真实皮肤、布料、雨水、玻璃、金属、街道路面反光。
    emotion: 真实、沉浸、故事感、可信。
    keywords:
    - cinematic realism
    - natural light
    - film still
    - realistic skin texture
    - 35mm lens
    - shallow depth of field
    - documentary atmosphere
    negative:
    - cheap CG
    - plastic skin
    - overprocessed HDR
    - random neon
    - fake bokeh
    - AI gloss
    - distorted face
