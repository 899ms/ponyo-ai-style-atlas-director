- id: miyazaki_ghibli
  public_names: ["宫崎骏风格", "吉卜力风格"]
  safe_label_zh: "日系手绘治愈动画风"
  safe_label_en: "warm hand-painted Japanese animated film atmosphere"
  category: "animation_studio"
  best_for: ["治愈短片", "乡野奇遇", "童心冒险", "自然与人关系", "温柔幻想"]
  visual_dna:
    composition: "开阔天空、乡野道路、山坡小镇、自然与人物比例悬殊，画面有呼吸感和留白。"
    color: "天空蓝、草木绿、奶油白、暖阳黄，饱和度适中，清透但不刺眼。"
    lighting: "柔和自然光，午后或清晨日照，空气透视明显。"
    texture: "手绘背景、水彩/赛璐璐感、可见笔触但保持干净。"
    camera: "低速横移、跟随步行、仰看云朵、远景建立空间。"
    emotion: "童心、温柔、平凡生活中的神秘感，治愈但不幼稚。"
    motifs: ["风吹草地", "白云", "乡间屋顶", "自行车", "小动物", "飞行感", "日常奇遇"]
