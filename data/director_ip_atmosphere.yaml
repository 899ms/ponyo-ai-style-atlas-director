  prompt_core_zh: "日系手绘治愈动画风，开阔蓝天与柔软云朵，乡间小路与绿意山坡，温暖自然光，手绘背景质感，平凡日常里的轻微奇幻，空气感强，情绪温柔而真实。"
  prompt_core_en: "warm hand-painted Japanese animated film atmosphere, open blue sky, soft clouds, countryside path, green hills, gentle natural sunlight, hand-painted background texture, subtle everyday wonder, airy composition, warm and grounded emotion."

